# ============================================================
# DomiLink - Backend: Build, Analisis y Deploy en Google Cloud Run
# ============================================================
#
# ARQUITECTURA:
#   GitHub Actions compila cada microservicio con Maven,
#   construye la imagen Docker, la sube a Google Artifact
#   Registry y la despliega en Cloud Run (zona us-central1).
#
# COSTO:
#   Cloud Run tiene un "Always Free" tier:
#   - 2,000,000 requests/mes gratis
#   - 360,000 GB-segundos de CPU/mes gratis
#   - 180,000 GB-segundos de RAM/mes gratis
#   Artifact Registry: 0.5 GB gratis por region
#
# FLUJO:
#   push a main/develop
#     └── analizar (compile + test)
#           └── build Docker (cada servicio en paralelo)
#                 └── deploy Cloud Run (solo en main)
#
# SECRETOS NECESARIOS en GitHub:
#   GCP_PROJECT_ID        -> ID del proyecto en Google Cloud
#   GCP_SA_KEY            -> JSON de Service Account (base64)
#   JWT_SECRET            -> Clave JWT para produccion
# ============================================================

name: Backend - Build y Deploy en Cloud Run

on:
  push:
    branches: [main, develop]
    paths:
      - 'domilink/**'
      - '.github/workflows/backend-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'domilink/**'

env:
  # Google Cloud
  GCP_REGION: us-central1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  # Registro de imagenes (Artifact Registry es el sucesor de GCR)
  REGISTRY: us-central1-docker.pkg.dev
  REPO_NAME: domilink
  # Java
  JAVA_VERSION: '17'

jobs:
  # ============================================================
  # JOB 1: ANALISIS - Compile + Tests (corre en todo push/PR)
  # ============================================================
  analizar:
    name: "Analizar codigo (Maven)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: domilink

    steps:
      - name: "1. Descargar el codigo del repositorio"
        uses: actions/checkout@v4

      - name: "2. Configurar Java 17 con cache de Maven"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: "3. Compilar todos los modulos Maven"
        # Verifica que el codigo compila sin errores
        run: mvn compile --no-transfer-progress -q
        env:
          # Evita error si hay referencias a JWT_SECRET en compile time
          JWT_SECRET: placeholder-only-for-compile-not-real

      - name: "4. Ejecutar tests unitarios"
        # -q silencia Maven, muestra solo errores reales
        run: |
          mvn test --no-transfer-progress \
            -DJWT_SECRET=test-secret-ci-pipeline-minimum-256-bits-long-key
        # Si no hay tests aun, Maven no falla, simplemente reporta 0 tests

      - name: "5. Publicar resultado de compilacion"
        if: always()
        run: |
          echo "## Analisis Backend" >> $GITHUB_STEP_SUMMARY
          echo "| Modulo | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          for svc in api-gateway auth-service company-service courier-service order-service; do
            if [ -d "$svc/target/classes" ]; then
              echo "| $svc | ✅ OK |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $svc | ❌ Sin compilar |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ============================================================
  # JOB 2: BUILD Y PUSH DE IMAGENES DOCKER (en paralelo por servicio)
  # Solo corre en push (no en PRs) para no gastar quota de GCP
  # ============================================================
  build-y-push:
    name: "Build Docker - ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: analizar
    if: github.event_name == 'push'

    strategy:
      # Construye los 5 servicios en paralelo (mas rapido)
      matrix:
        service:
          - name: api-gateway
            port: 8080
          - name: auth-service
            port: 8081
          - name: company-service
            port: 8082
          - name: courier-service
            port: 8083
          - name: order-service
            port: 8084
      fail-fast: false  # Si falla uno, los demas siguen

    steps:
      - name: "1. Descargar codigo"
        uses: actions/checkout@v4

      - name: "2. Autenticar en Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: "3. Configurar gcloud CLI"
        uses: google-github-actions/setup-gcloud@v2

      - name: "4. Configurar Docker para Artifact Registry"
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: "5. Configurar BuildKit (builds mas rapidos)"
        uses: docker/setup-buildx-action@v3

      - name: "6. Definir tag de imagen"
        id: tag
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ matrix.service.name }}"
          # Tag con sha corto + 'latest' si es main
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$IMAGE:$SHORT_SHA" >> $GITHUB_OUTPUT
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "latest_tag=$IMAGE:latest" >> $GITHUB_OUTPUT
          else
            echo "latest_tag=$IMAGE:develop" >> $GITHUB_OUTPUT
          fi

      - name: "7. Build y Push imagen Docker de ${{ matrix.service.name }}"
        uses: docker/build-push-action@v5
        with:
          context: domilink
          # Cada servicio tiene su propio Dockerfile
          file: domilink/${{ matrix.service.name }}/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.latest_tag }}
          # Cache en GitHub Actions para builds mas rapidos la proxima vez
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

      - name: "8. Reportar imagen construida"
        run: |
          echo "### ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Imagen: \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Puerto: ${{ matrix.service.port }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 3: DEPLOY EN CLOUD RUN (solo en push a main)
  # Despliega cada microservicio como un servicio independiente
  # ============================================================
  deploy-cloud-run:
    name: "Deploy Cloud Run - ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    needs: build-y-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    strategy:
      matrix:
        service:
          - name: api-gateway
            port: 8080
            # El gateway es el unico expuesto publicamente
            allow_unauthenticated: true
            memory: 512Mi
            cpu: 1
          - name: auth-service
            port: 8081
            # Los servicios internos no necesitan acceso publico directo
            # El gateway les envia trafico internamente
            allow_unauthenticated: true
            memory: 512Mi
            cpu: 1
          - name: company-service
            port: 8082
            allow_unauthenticated: true
            memory: 256Mi
            cpu: 1
          - name: courier-service
            port: 8083
            allow_unauthenticated: true
            memory: 256Mi
            cpu: 1
          - name: order-service
            port: 8084
            allow_unauthenticated: true
            memory: 512Mi
            cpu: 1
      fail-fast: false

    steps:
      - name: "1. Autenticar en Google Cloud"
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: "2. Configurar gcloud"
        uses: google-github-actions/setup-gcloud@v2

      - name: "3. Definir URL de imagen"
        id: image
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          IMAGE="${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ matrix.service.name }}:$SHORT_SHA"
          echo "url=$IMAGE" >> $GITHUB_OUTPUT

      - name: "4. Obtener URLs de otros servicios (para api-gateway)"
        id: service-urls
        run: |
          # Obtener la URL de cada servicio ya desplegado
          get_url() {
            gcloud run services describe "domilink-$1" \
              --region=${{ env.GCP_REGION }} \
              --format="value(status.url)" 2>/dev/null || echo ""
          }
          echo "auth_url=$(get_url auth-service)" >> $GITHUB_OUTPUT
          echo "company_url=$(get_url company-service)" >> $GITHUB_OUTPUT
          echo "courier_url=$(get_url courier-service)" >> $GITHUB_OUTPUT
          echo "order_url=$(get_url order-service)" >> $GITHUB_OUTPUT

      - name: "5. Deploy ${{ matrix.service.name }} en Cloud Run"
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: domilink-${{ matrix.service.name }}
          image: ${{ steps.image.outputs.url }}
          region: ${{ env.GCP_REGION }}
          # Escala a 0 cuando no hay trafico (ahorra dinero, sigue siendo gratis)
          flags: >-
            --min-instances=0
            --max-instances=3
            --memory=${{ matrix.service.memory }}
            --cpu=${{ matrix.service.cpu }}
            --port=${{ matrix.service.port }}
            --timeout=60s
            --concurrency=80
            ${{ matrix.service.allow_unauthenticated && '--allow-unauthenticated' || '' }}
          env_vars: |
            SPRING_APPLICATION_NAME=${{ matrix.service.name }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=86400000
            FIREBASE_PROJECT_ID=domilink-prod
            AUTH_SERVICE_URL=${{ steps.service-urls.outputs.auth_url }}
            COMPANY_SERVICE_URL=${{ steps.service-urls.outputs.company_url }}
            COURIER_SERVICE_URL=${{ steps.service-urls.outputs.courier_url }}
            ORDER_SERVICE_URL=${{ steps.service-urls.outputs.order_url }}
            PRICING_BASE_PRICE=3000.0
            PRICING_PRICE_PER_KM=1500.0
            PRICING_MINIMUM_PRICE=5000.0
            PRICING_MAXIMUM_PRICE=80000.0

      - name: "6. Reportar URL del servicio"
        run: |
          echo "### ${{ matrix.service.name }} desplegado" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Memoria: ${{ matrix.service.memory }}" >> $GITHUB_STEP_SUMMARY
          echo "- Region: ${{ env.GCP_REGION }}" >> $GITHUB_STEP_SUMMARY
