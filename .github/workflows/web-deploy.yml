# ============================================================
# DomiLink - Web: Build Expo + Deploy en Vercel (GRATUITO)
# ============================================================
#
# COMO FUNCIONA:
#   1. Verifica TypeScript
#   2. Exporta la app como sitio estatico con expo export --platform web
#   3. Despliega en Vercel via CLI (produccion o preview segun rama)
#
# SECRETOS NECESARIOS en GitHub:
#   VERCEL_TOKEN        -> Token de Vercel
#   VERCEL_ORG_ID       -> ID de la org
#   VERCEL_PROJECT_ID   -> ID del proyecto
#   API_GATEWAY_URL     -> URL del API Gateway en Cloud Run
# ============================================================

name: Web - Build y Deploy en Vercel

on:
  push:
    branches: [main, develop]
    paths:
      - 'domilink-mobile/**'
      - '.github/workflows/web-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'domilink-mobile/**'

env:
  NODE_VERSION: '18'

jobs:
  # ============================================================
  # JOB UNICO: TypeScript + Build + Deploy en un solo paso
  # ============================================================
  build-y-deploy:
    name: "Build y Deploy Web en Vercel"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: domilink-mobile

    steps:
      - name: "1. Descargar codigo"
        uses: actions/checkout@v4

      - name: "2. Configurar Node.js 18 con cache npm"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: domilink-mobile/package-lock.json

      - name: "3. Instalar dependencias"
        run: npm ci

      - name: "4. Verificar tipos con TypeScript"
        run: npx tsc --noEmit

      - name: "5. Inyectar URL del API Gateway"
        run: |
          API_URL="${{ secrets.API_GATEWAY_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://domilink-api-gateway-755906643293.us-central1.run.app"
            echo "::warning::API_GATEWAY_URL no configurado. Usando URL de Cloud Run directamente."
          fi
          echo "EXPO_PUBLIC_API_URL=$API_URL" > .env
          echo "EXPO_PUBLIC_APP_ENV=production" >> .env
          echo "API configurado: $API_URL"

      - name: "6. Build Expo Web (sitio estatico)"
        run: npx expo export --platform web --output-dir dist --clear
        env:
          CI: true
          EXPO_METRO_PLATFORM_WEB: "1"
          EXPO_PUBLIC_API_URL: ${{ secrets.API_GATEWAY_URL }}
          EXPO_PUBLIC_APP_ENV: production

      - name: "7. Verificar que el build genero archivos"
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "::error::El build fallo: dist/index.html no existe"
            exit 1
          fi
          FILE_COUNT=$(find dist -type f | wc -l)
          DIST_SIZE=$(du -sh dist/ | cut -f1)
          echo "Build exitoso: $FILE_COUNT archivos, $DIST_SIZE total"

      - name: "8. Instalar Vercel CLI"
        if: github.event_name == 'push'
        run: npm install -g vercel@latest
        working-directory: .

      - name: "9. Preparar Vercel Build Output y Deploy"
        if: github.event_name == 'push'
        id: deploy
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            PROD_FLAG="--prod"
            echo "Desplegando en PRODUCCION..."
          else
            PROD_FLAG=""
            echo "Desplegando PREVIEW..."
          fi

          # Paso A: vincular el proyecto de Vercel (no ejecuta ningun build).
          vercel pull \
            --yes \
            --environment=production \
            --token="${{ secrets.VERCEL_TOKEN }}"

          # Paso B: construir el Vercel Build Output manualmente.
          #
          # Vercel Build Output API v3 espera esta estructura:
          #   .vercel/output/
          #     config.json          <- routes, headers, rewrites
          #     static/              <- archivos estaticos del sitio
          #
          # De este modo --prebuilt sube exactamente lo que expo export generó
          # (con metro.config.js y el stub CJS de reanimated) sin que Vercel
          # vuelva a ejecutar npx expo export en su infra.
          mkdir -p .vercel/output/static

          # Copiar el sitio estatico generado por expo export
          cp -r dist/. .vercel/output/static/

          # Generar config.json con rewrites y headers de vercel.json
          # Los rewrites se traducen a routes en el Build Output API.
          node -e "
          const vercelJson = require('./vercel.json');
          const routes = [];

          // Headers
          if (vercelJson.headers) {
            for (const h of vercelJson.headers) {
              routes.push({ src: h.source, headers: Object.fromEntries(h.headers.map(x=>[x.key,x.value])) });
            }
          }

          // Rewrites (proxy API y SPA fallback)
          if (vercelJson.rewrites) {
            for (const r of vercelJson.rewrites) {
              routes.push({ src: r.source, dest: r.destination });
            }
          }

          const config = { version: 3, routes };
          require('fs').writeFileSync('.vercel/output/config.json', JSON.stringify(config, null, 2));
          console.log('config.json generado con', routes.length, 'routes');
          "

          echo "=== .vercel/output/config.json ==="
          cat .vercel/output/config.json | head -30

          # Paso C: deploy con --prebuilt (sube .vercel/output/ tal cual)
          DEPLOY_URL=$(vercel deploy \
            --prebuilt \
            $PROD_FLAG \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            2>&1 | grep -E 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)

          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          EXPO_PUBLIC_API_URL: ${{ secrets.API_GATEWAY_URL }}
          EXPO_PUBLIC_APP_ENV: production

      - name: "10. Publicar resultado"
        if: github.event_name == 'push'
        run: |
          echo "## Deploy Web - DomiLink" >> $GITHUB_STEP_SUMMARY
          echo "- Plataforma: Vercel (Hobby - Gratuito)" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Rama: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        working-directory: .
