# ============================================================
# DomiLink - Web: CI de TypeScript (deploy lo maneja Vercel via git)
# ============================================================
#
# FLUJO:
#   1. En cada push a main/develop: verificar TypeScript
#   2. Vercel recibe el webhook de GitHub y hace el build/deploy
#      automaticamente usando el buildCommand de vercel.json:
#      "node scripts/patch-reanimated.js && npx expo export --platform web"
#
# El proyecto Vercel esta configurado con rootDirectory=domilink-mobile,
# framework=null, outputDirectory=dist.
# npm ci ejecuta postinstall que parchea reanimated antes del build.
# ============================================================

name: Web - CI TypeScript

on:
  push:
    branches: [main, develop]
    paths:
      - 'domilink-mobile/**'
      - '.github/workflows/web-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'domilink-mobile/**'

env:
  NODE_VERSION: '18'

jobs:
  typecheck:
    name: "Verificar TypeScript"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: domilink-mobile

    steps:
      - name: "Descargar codigo"
        uses: actions/checkout@v4

      - name: "Configurar Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: domilink-mobile/package-lock.json

      - name: "Instalar dependencias (con postinstall que parchea reanimated)"
        run: npm ci

      - name: "Verificar tipos TypeScript"
        run: npx tsc --noEmit

      - name: "Verificar build web"
        run: npx expo export --platform web --output-dir dist --clear
        env:
          CI: true
          EXPO_METRO_PLATFORM_WEB: "1"
          EXPO_PUBLIC_APP_ENV: production

      - name: "Confirmar bundle sin ESM"
        run: |
          BUNDLE=$(ls dist/_expo/static/js/web/AppEntry-*.js 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "::error::No se genero el bundle de AppEntry"
            exit 1
          fi
          if grep -qP "^export\s+(default|const|function|class|\*|\{)" "$BUNDLE"; then
            echo "::error::El bundle contiene export ESM — el parche de reanimated fallo"
            exit 1
          fi
          SIZE=$(wc -c < "$BUNDLE")
          echo "Bundle OK: $(basename $BUNDLE) ($SIZE bytes)"
