server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Auth Service - rutas publicas (no requieren JWT)
        # URI configurable via AUTH_SERVICE_URL (Cloud Run) o http://auth-service:8081 (local)
        - id: auth-service-public
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # Company Service
        - id: company-service
          uri: ${COMPANY_SERVICE_URL:http://company-service:8082}
          predicates:
            - Path=/api/companies/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        # Courier Service
        - id: courier-service
          uri: ${COURIER_SERVICE_URL:http://courier-service:8083}
          predicates:
            - Path=/api/couriers/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        # Order Service
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://order-service:8084}
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

      default-filters:
        # Cloud Run agrega 'Access-Control-Allow-Origin: *' automaticamente.
        # Spring Gateway agrega su propio valor especifico.
        # El resultado es una cabecera con dos valores que el browser rechaza.
        # RETAIN_FIRST descarta el valor duplicado y conserva solo el primero
        # (el que Spring Gateway emite con la URL concreta del origen).
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Vary, RETAIN_FIRST

      globalcors:
        cors-configurations:
          '[/**]':
            # Listar todos los origenes validos.
            # NO usar allowedOrigins: "*" junto con allow-credentials: true — el browser lo rechaza.
            allowed-origins:
              - "https://domilink-mobile.vercel.app"
              - "http://localhost:8081"
              - "http://localhost:19006"
              - "http://localhost:3000"
            allowed-origin-patterns:
              - "http://localhost:*"
              - "http://10.0.2.2:*"
              - "http://192.168.*.*:*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowed-headers:
              - "*"
            exposed-headers:
              - Authorization
              - X-User-Id
              - X-User-Role
              - X-User-Email
            allow-credentials: false
            max-age: 3600

# JWT secret compartido (en produccion usar Secret Manager de GCP)
jwt:
  # NUNCA hardcodear en produccion - usar variable de entorno obligatoria
  # Para desarrollo local: export JWT_SECRET=domilink-dev-secret-min-32-chars-here
  secret: ${JWT_SECRET:domilink-dev-secret-min-32-chars-here-change-in-prod}
  expiration: 86400000 # 24 horas en ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.domilink: DEBUG
