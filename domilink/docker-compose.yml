version: '3.8'

# ============================================================
# DomiLink - Docker Compose para desarrollo local
# ============================================================
# Uso:
#   docker-compose up --build         # Primera vez
#   docker-compose up -d              # En background
#   docker-compose logs -f [servicio] # Ver logs
#   docker-compose down               # Detener
#
# Puertos locales:
#   API Gateway:      http://localhost:8080
#   Auth Service:     http://localhost:8081  (directo, solo debug)
#   Company Service:  http://localhost:8082  (directo, solo debug)
#   Courier Service:  http://localhost:8083  (directo, solo debug)
#   Order Service:    http://localhost:8084  (directo, solo debug)
# ============================================================

networks:
  domilink-network:
    driver: bridge
    name: domilink-network

services:

  # ==================== API GATEWAY ====================
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: domilink-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=api-gateway
      - JWT_SECRET=${JWT_SECRET:-domilink-super-secret-key-2024-change-in-production-minimum-256-bits}
    networks:
      - domilink-network
    depends_on:
      auth-service:
        condition: service_healthy
      company-service:
        condition: service_healthy
      courier-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== AUTH SERVICE ====================
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: domilink-auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_APPLICATION_NAME=auth-service
      - JWT_SECRET=${JWT_SECRET:-domilink-super-secret-key-2024-change-in-production-minimum-256-bits}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      # Firebase (opcional - dejar vacio para modo local)
      - FIREBASE_CREDENTIALS_PATH=${FIREBASE_CREDENTIALS_PATH:-}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-domilink-dev}
    volumes:
      # Montar credenciales de Firebase si existen
      - ${FIREBASE_CREDENTIALS_PATH:-/dev/null}:${FIREBASE_CREDENTIALS_PATH:-/dev/null}:ro
    networks:
      - domilink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== COMPANY SERVICE ====================
  company-service:
    build:
      context: .
      dockerfile: company-service/Dockerfile
    container_name: domilink-company-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_APPLICATION_NAME=company-service
      - FIREBASE_CREDENTIALS_PATH=${FIREBASE_CREDENTIALS_PATH:-}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-domilink-dev}
    networks:
      - domilink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== COURIER SERVICE ====================
  courier-service:
    build:
      context: .
      dockerfile: courier-service/Dockerfile
    container_name: domilink-courier-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_APPLICATION_NAME=courier-service
      - FIREBASE_CREDENTIALS_PATH=${FIREBASE_CREDENTIALS_PATH:-}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-domilink-dev}
    networks:
      - domilink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== ORDER SERVICE ====================
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: domilink-order-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_APPLICATION_NAME=order-service
      - FIREBASE_CREDENTIALS_PATH=${FIREBASE_CREDENTIALS_PATH:-}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-domilink-dev}
      - COURIER_SERVICE_URL=http://courier-service:8083
      - COMPANY_SERVICE_URL=http://company-service:8082
      # Configuracion de precios
      - PRICING_BASE_PRICE=${PRICING_BASE_PRICE:-3000.0}
      - PRICING_PRICE_PER_KM=${PRICING_PRICE_PER_KM:-1500.0}
      - PRICING_MINIMUM_PRICE=${PRICING_MINIMUM_PRICE:-5000.0}
      - PRICING_MAXIMUM_PRICE=${PRICING_MAXIMUM_PRICE:-80000.0}
    networks:
      - domilink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
